<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>购买专辑 | 一个人的宇宙</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #071418;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Noto Serif SC", "Songti SC", "Microsoft YaHei", serif;
      color: rgba(255, 250, 231, .92);
    }
    .page {
      text-align: center;
      padding: 40px 24px;
    }
    h2 {
      margin: 0 0 12px;
      font-size: clamp(24px, 5vw, 36px);
      font-weight: 400;
      letter-spacing: .12em;
    }
    p {
      margin: 0 0 40px;
      font-size: 14px;
      color: rgba(255, 250, 231, .55);
      letter-spacing: .08em;
      line-height: 1.8;
    }
    .btn-buy {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 40px;
      border: 1px solid rgba(255, 250, 230, .5);
      border-radius: 999px;
      color: rgba(255, 250, 230, .95);
      text-decoration: none;
      background: rgba(255, 255, 255, .08);
      backdrop-filter: blur(12px);
      letter-spacing: .2em;
      font-size: 15px;
      transition: transform .25s ease, background .25s ease, box-shadow .25s ease;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .3);
    }
    .btn-buy:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, .18);
      box-shadow: 0 16px 48px rgba(0, 0, 0, .4);
    }
    .btn-buy:active {
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="page">
    <h2>购买专辑</h2>
    <p>点击下方按钮前往抖音小店购买</p>
    <a class="btn-buy" href="https://haohuo.jinritemai.com/ecommerce/trade/detail/index.html?id=3779770081945452697&origin_type=604" target="_blank" rel="noopener">
      打开抖音小店  ›
    </a>
  </div>
</body>
</html>
