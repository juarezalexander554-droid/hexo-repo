<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>一个人的宇宙</title>
  <meta name="description" content="来自中国东海岸的后摇器乐摇滚乐队" />
  <style>
    :root {
      --void: #03030b;
      --deep: #09051c;
      --purple: #7b2cff;
      --rose: #ff3d7f;
      --amber: #ffc46b;
      --cyan: #6df7ff;
      --milk: #fff4df;
      --ink: rgba(255, 245, 225, .86);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; overflow: hidden; }
    body {
      font-family: "Noto Serif SC", "Songti SC", "Microsoft YaHei", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 25%, rgba(123, 44, 255, .36), transparent 32%),
        radial-gradient(circle at 78% 18%, rgba(255, 61, 127, .24), transparent 30%),
        radial-gradient(circle at 52% 86%, rgba(255, 196, 107, .20), transparent 34%),
        linear-gradient(135deg, #020208 0%, #08031b 44%, #100718 100%);
    }

    #starfield, #dust, #rose-petals, #shooting-stars {
      position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none;
    }
    #starfield { z-index: 0; }
    #dust { z-index: 5; mix-blend-mode: screen; }
    #rose-petals { z-index: 3; }
    #shooting-stars { z-index: 2; }

    .noise {
      position: fixed; inset: 0; z-index: 6; pointer-events: none; opacity: .13;
      background-image:
        repeating-radial-gradient(circle at 17% 32%, rgba(255,255,255,.12) 0 1px, transparent 1px 3px),
        repeating-linear-gradient(115deg, rgba(255,255,255,.04) 0 1px, transparent 1px 6px);
      mix-blend-mode: overlay;
      animation: noiseShift 8s steps(8) infinite;
    }
    @keyframes noiseShift { 50% { transform: translate3d(-2%, 1%, 0); } }

    .nebula {
      position: fixed; inset: -18%; z-index: 1; pointer-events: none; filter: blur(45px) saturate(150%);
      background:
        conic-gradient(from 210deg at 48% 52%, transparent, rgba(255,61,127,.22), rgba(109,247,255,.10), rgba(255,196,107,.19), transparent 70%),
        radial-gradient(closest-side at 55% 45%, rgba(123,44,255,.35), transparent 70%);
      animation: nebulaSpin 38s linear infinite;
      opacity: .95;
    }
    @keyframes nebulaSpin { to { transform: rotate(360deg) scale(1.04); } }

    .orbit-wrap {
      position: fixed; inset: 0; z-index: 2; pointer-events: none; transform-style: preserve-3d;
    }
    .orbit {
      position: absolute; left: 50%; top: 50%; width: min(92vw, 980px); aspect-ratio: 1/1;
      border: 1px solid rgba(255,196,107,.18); border-radius: 50%;
      transform: translate(-50%, -50%) rotateX(70deg) rotateZ(-16deg);
      box-shadow: 0 0 70px rgba(255,196,107,.08), inset 0 0 50px rgba(109,247,255,.05);
      animation: orbitPulse 6s ease-in-out infinite;
    }
    .orbit:nth-child(2) { width: min(68vw, 730px); border-color: rgba(255,61,127,.18); animation-delay: -2s; }
    .orbit:nth-child(3) { width: min(116vw, 1220px); border-color: rgba(109,247,255,.13); animation-delay: -4s; }
    @keyframes orbitPulse { 50% { opacity: .35; transform: translate(-50%, -50%) rotateX(70deg) rotateZ(18deg) scale(1.04); } }

    .planet {
      position: fixed; border-radius: 50%; z-index: 2; pointer-events: none;
      box-shadow: inset -18px -16px 28px rgba(0,0,0,.45), 0 0 46px rgba(255,196,107,.20);
    }
    .planet.one { width: 138px; height: 138px; right: 8vw; top: 12vh; background: radial-gradient(circle at 30% 25%, #ffe1a5, #aa5cff 38%, #251242 74%); animation: float 11s ease-in-out infinite; }
    .planet.two { width: 62px; height: 62px; left: 12vw; bottom: 18vh; background: radial-gradient(circle at 28% 22%, #fff6ce, #ff577f 42%, #1e0716 78%); animation: float 8s ease-in-out infinite reverse; }
    @keyframes float { 50% { transform: translateY(-24px) translateX(10px); } }

    .stage {
      position: relative; z-index: 7; min-height: 100vh; display: grid; place-items: center; padding: 7vh 5vw;
    }
    .hero {
      width: min(1120px, 96vw); min-height: 70vh; position: relative;
      display: grid; grid-template-columns: 1.05fr .95fr; gap: clamp(24px, 5vw, 70px); align-items: center;
    }

    .copy { position: relative; z-index: 3; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 10px; letter-spacing: .35em; text-transform: uppercase;
      color: rgba(255,196,107,.86); font-size: 12px; margin-bottom: 22px; text-shadow: 0 0 12px rgba(255,196,107,.45);
    }
    .eyebrow::before { content: ""; width: 42px; height: 1px; background: linear-gradient(90deg, transparent, var(--amber)); }

    h1 {
      margin: 0; font-size: clamp(54px, 9vw, 132px); line-height: .92; letter-spacing: .08em; color: #fff8e9;
      text-shadow: 0 0 16px rgba(255,196,107,.72), 0 0 42px rgba(255,61,127,.36), 0 0 90px rgba(123,44,255,.48);
      animation: titleGlow 4.8s ease-in-out infinite;
    }
    @keyframes titleGlow { 50% { filter: brightness(1.22); text-shadow: 0 0 22px rgba(255,196,107,.96), 0 0 58px rgba(255,61,127,.55), 0 0 120px rgba(109,247,255,.35); } }

    .subtitle {
      margin: 24px 0 0; font-size: clamp(18px, 2.2vw, 28px); color: rgba(255,244,223,.78); letter-spacing: .18em;
      text-shadow: 0 0 18px rgba(109,247,255,.25);
    }
    .manifesto {
      max-width: 620px; margin: 30px 0 0; color: rgba(255,244,223,.68); font-size: 15px; line-height: 1.95; letter-spacing: .08em;
    }
    .actions { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 34px; }
    .btn {
      position: relative; display: inline-flex; align-items: center; justify-content: center; min-width: 128px; padding: 13px 18px;
      color: #fff4df; text-decoration: none; border: 1px solid rgba(255,196,107,.45); border-radius: 999px; overflow: hidden;
      background: linear-gradient(135deg, rgba(255,196,107,.12), rgba(255,61,127,.08));
      box-shadow: 0 0 22px rgba(255,196,107,.12), inset 0 0 22px rgba(255,255,255,.03);
      backdrop-filter: blur(10px); transition: transform .25s, border-color .25s, box-shadow .25s;
      letter-spacing: .16em; font-size: 14px;
    }
    .btn::before { content: ""; position: absolute; inset: 0; transform: translateX(-120%); background: linear-gradient(90deg, transparent, rgba(255,255,255,.22), transparent); transition: transform .65s; }
    .btn:hover { transform: translateY(-3px); border-color: rgba(255,244,223,.9); box-shadow: 0 0 34px rgba(255,196,107,.35); }
    .btn:hover::before { transform: translateX(120%); }

    .visual { position: relative; min-height: 560px; display: grid; place-items: center; }
    .cat-aura {
      position: absolute; width: min(520px, 86vw); aspect-ratio: 1/1; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,196,107,.20), rgba(255,61,127,.13) 34%, rgba(123,44,255,.10) 52%, transparent 72%);
      filter: blur(8px); animation: aura 5.5s ease-in-out infinite;
    }
    @keyframes aura { 50% { transform: scale(1.08); opacity: .72; } }

    .cat {
      width: min(410px, 75vw); height: min(410px, 75vw); position: relative; filter: drop-shadow(0 0 38px rgba(255,196,107,.35));
      animation: catFloat 6.5s ease-in-out infinite;
    }
    @keyframes catFloat { 50% { transform: translateY(-18px) rotate(-1deg); } }
    .cat svg { width: 100%; height: 100%; overflow: visible; }
    .cat .eye { animation: eyePulse 3.8s ease-in-out infinite; transform-origin: center; }
    @keyframes eyePulse { 50% { filter: drop-shadow(0 0 16px rgba(109,247,255,1)); opacity: .95; } }
    .cat .tail { transform-origin: 74% 70%; animation: tailMove 4.5s ease-in-out infinite; }
    @keyframes tailMove { 50% { transform: rotate(8deg) translateX(4px); } }

    .rose-core {
      position: absolute; right: 3%; bottom: 10%; width: 155px; height: 155px; z-index: 3; filter: drop-shadow(0 0 28px rgba(255,61,127,.55));
      animation: roseSpin 14s linear infinite;
    }
    @keyframes roseSpin { to { transform: rotate(360deg); } }
    .rose-core span {
      position: absolute; left: 50%; top: 50%; width: 86px; height: 34px; transform-origin: 0 50%; border-radius: 80% 20% 80% 20%;
      background: radial-gradient(circle at 30% 40%, #fff0f2, #ff3d7f 38%, #66102d 80%);
      opacity: .88;
    }
    .rose-core span:nth-child(1){ transform: rotate(0deg) translateX(8px); }
    .rose-core span:nth-child(2){ transform: rotate(45deg) translateX(8px); }
    .rose-core span:nth-child(3){ transform: rotate(90deg) translateX(8px); }
    .rose-core span:nth-child(4){ transform: rotate(135deg) translateX(8px); }
    .rose-core span:nth-child(5){ transform: rotate(180deg) translateX(8px); }
    .rose-core span:nth-child(6){ transform: rotate(225deg) translateX(8px); }
    .rose-core span:nth-child(7){ transform: rotate(270deg) translateX(8px); }
    .rose-core span:nth-child(8){ transform: rotate(315deg) translateX(8px); }

    .morse {
      position: fixed; left: 22px; bottom: 18px; z-index: 8; color: rgba(255,196,107,.56); font: 12px/1.7 ui-monospace, SFMono-Regular, Consolas, monospace;
      letter-spacing: .18em; text-shadow: 0 0 10px rgba(255,196,107,.35); pointer-events: none;
    }

    @media (max-width: 820px) {
      body { overflow-y: auto; }
      .hero { grid-template-columns: 1fr; text-align: center; padding-top: 42px; }
      .eyebrow { justify-content: center; }
      .eyebrow::before { display: none; }
      .actions { justify-content: center; }
      .visual { min-height: 390px; order: -1; }
      .planet.one { width: 88px; height: 88px; }
      .morse { display: none; }
    }
  </style>
</head>
<body>
  <canvas id="starfield"></canvas>
  <canvas id="shooting-stars"></canvas>
  <canvas id="rose-petals"></canvas>
  <canvas id="dust"></canvas>
  <div class="nebula"></div>
  <div class="noise"></div>
  <div class="orbit-wrap"><div class="orbit"></div><div class="orbit"></div><div class="orbit"></div></div>
  <div class="planet one"></div><div class="planet two"></div>

  <main class="stage">
    <section class="hero" aria-label="一个人的宇宙官网首页">
      <div class="copy">
        <div class="eyebrow">POST ROCK · AI · CYBER ROMANCE</div>
        <h1>一个人的<br>宇宙</h1>
        <p class="subtitle">来自中国东海岸的后摇器乐摇滚乐队</p>
        <p class="manifesto">暹罗猫穿过玫瑰星云，摩斯电码在深空里闪烁。这里不是普通主页，是独立音乐、AI 技术与孤独浪漫共同燃烧的入口。</p>
        <nav class="actions" aria-label="站点导航">
          <a class="btn" href="/archives/">作品</a>
          <a class="btn" href="/band/">乐队介绍</a>
          <a class="btn" href="/about/">关于网页</a>
          <a class="btn" href="/3b285438-e417-4308-ae98-dcaf9c423a9d/">隐秘页</a>
        </nav>
      </div>

      <div class="visual" aria-hidden="true">
        <div class="cat-aura"></div>
        <div class="cat">
          <svg viewBox="0 0 500 500" role="img">
            <defs>
              <radialGradient id="fur" cx="50%" cy="38%" r="62%">
                <stop offset="0" stop-color="#fff1d0"/>
                <stop offset=".46" stop-color="#caa46f"/>
                <stop offset="1" stop-color="#211329"/>
              </radialGradient>
              <linearGradient id="darkfur" x1="0" x2="1">
                <stop offset="0" stop-color="#211329"/><stop offset="1" stop-color="#080713"/>
              </linearGradient>
              <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            </defs>
            <path class="tail" d="M348 354 C460 332 454 232 392 221 C338 211 329 279 374 286 C401 290 414 266 400 249" fill="none" stroke="url(#darkfur)" stroke-width="42" stroke-linecap="round" opacity=".96"/>
            <path d="M139 203 L98 92 L190 151 Z" fill="url(#darkfur)"/>
            <path d="M361 203 L402 92 L310 151 Z" fill="url(#darkfur)"/>
            <ellipse cx="250" cy="265" rx="144" ry="164" fill="url(#fur)"/>
            <path d="M140 215 C170 150 328 150 360 215 C324 194 177 194 140 215Z" fill="rgba(20,12,28,.75)"/>
            <ellipse cx="196" cy="258" rx="38" ry="25" fill="#160d1f"/>
            <ellipse cx="304" cy="258" rx="38" ry="25" fill="#160d1f"/>
            <ellipse class="eye" cx="196" cy="258" rx="17" ry="22" fill="#7dfaff" filter="url(#glow)"/>
            <ellipse class="eye" cx="304" cy="258" rx="17" ry="22" fill="#7dfaff" filter="url(#glow)"/>
            <path d="M250 298 L230 322 Q250 338 270 322 Z" fill="#160d1f"/>
            <path d="M250 321 C229 350 198 344 182 330 M250 321 C271 350 302 344 318 330" fill="none" stroke="#2d1930" stroke-width="8" stroke-linecap="round"/>
            <path d="M98 296 C54 282 32 267 10 252 M99 318 C56 322 31 327 7 340 M402 296 C446 282 468 267 490 252 M401 318 C444 322 469 327 493 340" stroke="rgba(255,244,223,.52)" stroke-width="5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="rose-core"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
      </div>
    </section>
  </main>
  <div class="morse">-- --- .-. ... . · .-. --- ... . · ... .. .- -- · -.-. .- - · ... .--. .- -.-. .</div>

  <script>
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    const canvases = ['starfield', 'dust', 'rose-petals', 'shooting-stars'].reduce((acc, id) => {
      const c = document.getElementById(id); const ctx = c.getContext('2d'); acc[id] = { c, ctx }; return acc;
    }, {});
    let W = 0, H = 0, stars = [], dust = [], petals = [], meteors = [];

    function resize() {
      W = innerWidth; H = innerHeight;
      Object.values(canvases).forEach(({c, ctx}) => { c.width = W * DPR; c.height = H * DPR; c.style.width = W + 'px'; c.style.height = H + 'px'; ctx.setTransform(DPR, 0, 0, DPR, 0, 0); });
      stars = Array.from({length: Math.floor(W * H / 3300)}, () => ({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.7+.25, a: Math.random(), s: Math.random()*0.35+.08 }));
      dust = Array.from({length: 110}, () => ({ x: Math.random()*W, y: Math.random()*H, vx: (Math.random()-.5)*.5, vy: (Math.random()-.5)*.5, r: Math.random()*2+1, life: Math.random()*100 }));
      petals = Array.from({length: 34}, () => ({ x: Math.random()*W, y: Math.random()*H, vx: Math.random()*0.8+.25, vy: Math.random()*0.55+.15, rot: Math.random()*Math.PI, vr: (Math.random()-.5)*.035, size: Math.random()*16+9 }));
      meteors = [];
    }
    addEventListener('resize', resize); resize();

    let mouse = {x: W/2, y: H/2, active:false};
    addEventListener('pointermove', e => { mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true; for (let i=0;i<4;i++) dust.push({x: mouse.x, y: mouse.y, vx:(Math.random()-.5)*2.6, vy:(Math.random()-.5)*2.6, r:Math.random()*2.6+1, life:80}); if(dust.length>180) dust.splice(0,dust.length-180); });

    function drawStarfield(t) {
      const ctx = canvases.starfield.ctx; ctx.clearRect(0,0,W,H);
      for (const st of stars) {
        const tw = .45 + Math.sin(t*.001*st.s + st.a*9)*.55;
        ctx.beginPath(); ctx.fillStyle = `rgba(255,244,223,${0.18 + tw*.72})`; ctx.arc(st.x, st.y, st.r*(.7+tw*.5), 0, Math.PI*2); ctx.fill();
      }
    }
    function drawDust() {
      const ctx = canvases.dust.ctx; ctx.clearRect(0,0,W,H);
      dust.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.life-=1; const a=Math.max(p.life/90,0); ctx.beginPath(); ctx.fillStyle=`rgba(255,196,107,${a*.55})`; ctx.shadowColor='rgba(255,196,107,.8)'; ctx.shadowBlur=12; ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0; });
      dust = dust.filter(p => p.life>0 && p.x>-20 && p.x<W+20 && p.y>-20 && p.y<H+20);
    }
    function drawPetals() {
      const ctx = canvases['rose-petals'].ctx; ctx.clearRect(0,0,W,H);
      for (const p of petals) {
        p.x += p.vx + Math.sin(p.y*.012)*.45; p.y += p.vy; p.rot += p.vr;
        if (p.x > W+40) p.x = -40; if (p.y > H+40) p.y = -40;
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.scale(1, .52);
        const g = ctx.createRadialGradient(0,0,1,0,0,p.size); g.addColorStop(0,'rgba(255,240,242,.9)'); g.addColorStop(.42,'rgba(255,61,127,.78)'); g.addColorStop(1,'rgba(102,16,45,.18)');
        ctx.fillStyle = g; ctx.beginPath(); ctx.ellipse(0,0,p.size,p.size*.72,0,0,Math.PI*2); ctx.fill(); ctx.restore();
      }
    }
    function drawMeteors() {
      const ctx = canvases['shooting-stars'].ctx; ctx.clearRect(0,0,W,H);
      if (Math.random() < .028) meteors.push({x: Math.random()*W*.9, y: -30, vx: -7-Math.random()*6, vy: 6+Math.random()*4, life: 70});
      for (const m of meteors) {
        m.x += m.vx; m.y += m.vy; m.life--;
        const grad = ctx.createLinearGradient(m.x,m.y,m.x-m.vx*8,m.y-m.vy*8); grad.addColorStop(0,'rgba(255,244,223,.95)'); grad.addColorStop(.45,'rgba(109,247,255,.35)'); grad.addColorStop(1,'transparent');
        ctx.strokeStyle = grad; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(m.x,m.y); ctx.lineTo(m.x-m.vx*10,m.y-m.vy*10); ctx.stroke();
      }
      meteors = meteors.filter(m => m.life>0 && m.y<H+100);
    }
    function tick(t) { drawStarfield(t); drawDust(); drawPetals(); drawMeteors(); requestAnimationFrame(tick); }
    requestAnimationFrame(tick);
  </script>
</body>
</html>
